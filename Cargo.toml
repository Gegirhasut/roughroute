[workspace]
resolver = "2"
members = [
    "crates/core",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/Gegirhasut/roughroute"
rust-version = "1.85"

[workspace.dependencies]
roughroute-core = { path = "crates/core" }
proptest = "1"

[profile.release]
lto = true
